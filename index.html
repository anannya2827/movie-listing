<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault Pro | Ultimate Movie Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🎬 CineVault <span class="pro-badge">PRO</span></div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search heroes & masterpieces (e.g., Avengers, Spiderman, Wonder Woman)...">
        </div>
        <div class="nav-tabs">
            <button id="nav-search" class="active-tab">🏠 Browse</button>
            <button id="nav-favorites">❤️ Favorites (<span id="fav-count">0</span>)</button>
        </div>
    </header>

    <main>
        <h2 id="view-title">Trending Discoveries</h2>
        <div id="movie-grid" class="grid-layout"></div>
    </main>

    <div id="movie-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="modal-body-data"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
